resources:
  jobs:
    my_pipeline_orchestration_job:
      name: "declarative_job_orchestrate_etl"

      trigger:
        # Run this job every day, exactly one day from the last run
        # See https://docs.databricks.com/api/workspace/jobs/create#trigger
        periodic:
          interval: 1
          unit: DAYS

      email_notifications:
        on_failure:
          - <email-address>

      tasks:
        - task_key: run_declarative_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.my_declarative_pipeline.id}