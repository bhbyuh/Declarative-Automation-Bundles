resources:
  pipelines:
    my_declarative_pipeline:
      name: "etl_declarative_pipeline_${bundle.environment}"
      catalog: poc
      schema: bronze
      # schema: my_schema
      configuration:
        source_table: "poc.bronze.taxi_zones"
        bronze_table: "bundle_bronze_taxi_zone"
        silver_table: "bundle_silver_taxi_zone"
        gold_table: "bundle_gold_taxi_zone_mat_view"
        filter_borough: "Queens"

      libraries:
        # References your explicit logic path
        - file:
            path: ../src/transformations/my_transformation.py 
      serverless: true
    
    trips_pipeline:
      name: trips_pipeline
      catalog: poc
      schema: bronze

      configuration:
        source_table: "poc.bronze.taxi_zones"
